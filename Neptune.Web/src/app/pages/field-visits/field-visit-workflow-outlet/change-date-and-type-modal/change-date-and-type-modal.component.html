<div class="modal">
    <div class="modal-header">
        <h3>Change Visit Date or Type</h3>
    </div>
    <div class="modal-body">
        <app-alert-display></app-alert-display>
        <form [formGroup]="formGroup" class="grid-12">
            <form-field
                class="g-col-12"
                [formControl]="formGroup.controls.VisitDate"
                fieldLabel="Visit Date"
                [type]="FormFieldType.Date"
                [required]="true"></form-field>
            <form-field
                class="g-col-12"
                [formControl]="formGroup.controls.FieldVisitTypeID"
                fieldLabel="Field Visit Type"
                [type]="FormFieldType.Select"
                [required]="true"
                [formInputOptions]="fieldVisitTypeOptions"></form-field>
        </form>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-primary" (click)="save()">Save</button>
        <button type="button" class="btn btn-primary-outline" (click)="cancel()">Cancel</button>
    </div>
</div>
