<page-header pageTitle="Download OVTA Assessment Areas">
    <a class="back-link" [routerLink]="['/data-hub']" [queryParams]="{ tab: 'trash' }">&laquo; Back to Data Hub</a>
</page-header>

<section class="content-section">
    <app-alert-display></app-alert-display>

    <div class="grid-12">
        <div class="g-col-6 instructions">
            <custom-rich-text [customRichTextTypeID]="NeptunePageTypeEnum.ExportAssessmentGeospatialData"></custom-rich-text>
        </div>
        <div class="g-col-6">
            @if (jurisdictionOptions$ | async; as opts) {
                <form-field fieldLabel="Stormwater Jurisdiction" [type]="FormFieldType.Select" [formControl]="jurisdictionControl" [formInputOptions]="opts" placeholder="Select a jurisdiction"></form-field>
            }
            <div class="actions">
                <button type="button" class="btn btn-primary" [disabled]="isWorking() || jurisdictionControl.invalid" (click)="download()">
                    @if (isWorking()) { <i class="fa fa-spinner fa-spin"></i> Building... } @else { <i class="fa fa-download"></i> Download GDB }
                </button>
            </div>
        </div>
    </div>
</section>
