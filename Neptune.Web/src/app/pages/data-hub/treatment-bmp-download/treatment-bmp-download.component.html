<page-header pageTitle="Download Treatment BMPs">
    <a class="back-link" [routerLink]="['/data-hub']" [queryParams]="{ tab: 'bmps' }">&laquo; Back to Data Hub</a>
    &nbsp;|&nbsp;
    <a class="back-link" [routerLink]="['/data-hub/treatment-bmp-upload']">Go to Upload Treatment BMPs &raquo;</a>
</page-header>

<section class="content-section">
    <app-alert-display></app-alert-display>

    <div class="grid-12">
        <div class="g-col-6 instructions">
            <custom-rich-text [customRichTextTypeID]="NeptunePageTypeEnum.ExportBMPInventoryToGIS"></custom-rich-text>
        </div>
        <div class="g-col-6">
            <div class="actions">
                <button type="button" class="btn btn-primary" [disabled]="isWorking()" (click)="download()">
                    @if (isWorking()) { <i class="fa fa-spinner fa-spin"></i> Building... } @else { <i class="fa fa-download"></i> Download GDB }
                </button>
            </div>
        </div>
    </div>
</section>
