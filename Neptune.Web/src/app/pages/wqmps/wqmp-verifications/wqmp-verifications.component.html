<page-header pageTitle="WQMP O&M Verifications" [customRichTextTypeID]="customRichTextTypeID"></page-header>

<app-alert-display></app-alert-display>

@if (verifications$ | async; as verifications) {
    <neptune-grid
        [rowData]="verifications"
        [columnDefs]="columnDefs"
        [pagination]="true"
        [downloadFileName]="'WQMPVerifications'">
    </neptune-grid>
}

<div [loadingSpinner]="{ isLoading: isLoading, loadingHeight: 600 }"></div>
