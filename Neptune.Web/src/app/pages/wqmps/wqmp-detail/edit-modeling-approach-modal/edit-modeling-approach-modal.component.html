<div class="modal-header">
    <h3 class="section-title">Edit Modeling Approach</h3>
</div>

<div class="modal-body">
    <app-alert-display></app-alert-display>
    <p>Select which modeling option will be used for this WQMP site.</p>
    <form class="form">
        @for (option of modelingApproachOptions; track option.Value) {
            <label class="modeling-approach-option">
                <input type="radio" [formControl]="modelingApproachControl" [value]="option.Value" />
                <div>
                    <strong>{{ option.Label }}</strong>
                    <div class="modeling-approach-option__description">{{ modelingApproachDescriptions[option.Value] }}</div>
                </div>
            </label>
        }
    </form>
</div>

<div class="modal-footer">
    <button class="btn btn-primary" (click)="save()">Save</button>
    <button class="btn btn-primary-outline" (click)="cancel()">Cancel</button>
</div>
