<div class="modal-header">
    <h3 class="section-title">Edit Modeling Approach</h3>
</div>

<div class="modal-body grid-12">
    <app-alert-display></app-alert-display>
    <form class="form grid-12">
        <form-field
            class="g-col-12"
            [formControl]="modelingApproachControl"
            fieldLabel="Modeling Approach"
            placeholder="Select a modeling approach"
            [required]="true"
            [type]="FormFieldType.Select"
            [formInputOptions]="modelingApproachOptions"></form-field>
        @if (modelingApproachControl.value) {
            <p class="g-col-12 text-muted">
                {{ modelingApproachDescriptions[modelingApproachControl.value] }}
            </p>
        }
    </form>
</div>

<div class="modal-footer">
    <button class="btn btn-primary" (click)="save()" [disabled]="!modelingApproachControl.value">Save</button>
    <button class="btn btn-primary-outline" (click)="cancel()">Cancel</button>
</div>
