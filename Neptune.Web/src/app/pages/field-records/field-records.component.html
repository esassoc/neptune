<page-header pageTitle="Field Records"></page-header>

<app-alert-display></app-alert-display>

<div class="page-body">
    <div class="card">
        <div class="card-header">
            <span class="card-title">Field Visits</span>
        </div>
        <div class="card-body">
            <neptune-grid
                [rowData]="fieldVisits$ | async"
                [columnDefs]="fieldVisitColumnDefs"
                [pagination]="true"
                downloadFileName="field-visits"></neptune-grid>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-title">Assessment Records</span>
        </div>
        <div class="card-body">
            <neptune-grid
                [rowData]="assessments$ | async"
                [columnDefs]="assessmentColumnDefs"
                [pagination]="true"
                downloadFileName="assessment-records"></neptune-grid>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-title">Maintenance Records</span>
        </div>
        <div class="card-body">
            <neptune-grid
                [rowData]="maintenanceRecords$ | async"
                [columnDefs]="maintenanceRecordColumnDefs"
                [pagination]="true"
                downloadFileName="maintenance-records"></neptune-grid>
        </div>
    </div>
</div>
