<div class="modal">
<div class="modal-header">
    <h3>{{ isEdit ? "Edit" : "Add" }} Custom Attribute Type</h3>
</div>
<div class="modal-body">
    <app-alert-display></app-alert-display>
    <form [formGroup]="formGroup">
        <div class="grid-12">
            <form-field class="g-col-12" [formControl]="formGroup.controls.CustomAttributeTypeName"
                fieldLabel="Name" [type]="FormFieldType.Text" [required]="true" placeholder="Attribute Name">
            </form-field>
            <form-field class="g-col-6" [formControl]="formGroup.controls.CustomAttributeDataTypeID"
                fieldLabel="Data Type" [type]="FormFieldType.Select" [required]="true"
                placeholder="Select Data Type" [formInputOptions]="dataTypeOptions">
            </form-field>
            <form-field class="g-col-6" [formControl]="formGroup.controls.CustomAttributeTypePurposeID"
                fieldLabel="Purpose" [type]="FormFieldType.Select" [required]="true"
                placeholder="Select Purpose" [formInputOptions]="purposeOptions">
            </form-field>
            <form-field class="g-col-6" [formControl]="formGroup.controls.MeasurementUnitTypeID"
                fieldLabel="Measurement Unit" [type]="FormFieldType.Select"
                placeholder="Select Unit (optional)" [formInputOptions]="unitOptions">
            </form-field>
            <form-field class="g-col-6" [formControl]="formGroup.controls.IsRequired"
                fieldLabel="Is Required" [type]="FormFieldType.Select"
                [formInputOptions]="booleanOptions">
            </form-field>
            <form-field class="g-col-12" [formControl]="formGroup.controls.CustomAttributeTypeDescription"
                fieldLabel="Description" [type]="FormFieldType.Textarea" placeholder="Description (optional)">
            </form-field>
            <form-field class="g-col-12" [formControl]="formGroup.controls.CustomAttributeTypeDefaultValue"
                fieldLabel="Default Value" [type]="FormFieldType.Text" placeholder="Default value (optional)">
            </form-field>
        </div>

        @if (showOptionsEditor) {
            <h4 class="mt-3">Options</h4>
            <p class="system-text">Add the available options for this pick-list or multi-select attribute.</p>
            <div class="options-editor">
                @for (option of optionsList(); track $index) {
                    <div class="options-editor__item">
                        <span>{{ option }}</span>
                        <button type="button" class="btn btn-sm btn-danger-outline" (click)="removeOption($index)">
                            <i class="fa fa-trash"></i>
                        </button>
                    </div>
                }
                <div class="options-editor__add">
                    <input type="text" class="form-control form-control-sm" placeholder="New option..."
                        [value]="newOptionText()" (input)="newOptionText.set($any($event.target).value)"
                        (keydown.enter)="addOption(); $event.preventDefault()">
                    <button type="button" class="btn btn-sm btn-primary-outline" (click)="addOption()">
                        <i class="fa fa-plus"></i> Add
                    </button>
                </div>
            </div>
        }
    </form>
</div>
<div class="modal-footer">
    <button class="btn btn-primary" (click)="save()" [disabled]="formGroup.invalid">Save</button>
    <button class="btn btn-secondary-outline" (click)="cancel()">Cancel</button>
</div>
</div>
