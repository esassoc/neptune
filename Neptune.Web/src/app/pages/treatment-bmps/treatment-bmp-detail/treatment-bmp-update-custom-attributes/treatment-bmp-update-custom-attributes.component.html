<page-header [pageTitle]="'Edit ' + (purposeName || 'Custom Attributes')" [templateAbove]="templateAbove">
    <ng-template #templateAbove>
        <div class="back">
            <a [routerLink]="['/treatment-bmps', treatmentBMPID]" class="back__link">Back to BMP Detail</a>
        </div>
    </ng-template>
</page-header>

<app-alert-display></app-alert-display>

@if (treatmentBMPID != null && customAttributePurposeID != null) {
    <treatment-bmp-custom-attributes-form
        [treatmentBMPID]="treatmentBMPID"
        [customAttributePurposeID]="customAttributePurposeID"
        (saved)="onSaved()"
        (cancelled)="onCancelled()"></treatment-bmp-custom-attributes-form>
}
