<page-header pageTitle="Edit Photos" [templateAbove]="templateAbove">
    <ng-template #templateAbove>
        <div class="back">
            <a [routerLink]="['/treatment-bmps', treatmentBMPID]" class="back__link"><i class="fa fa-arrow-left"></i> Back to BMP</a>
        </div>
    </ng-template>
</page-header>

<app-alert-display></app-alert-display>

@if (treatmentBMPID != null) {
    <treatment-bmp-images-editor
        [treatmentBMPID]="treatmentBMPID"
        (saved)="onSaved()"
        (cancelled)="onCancelled()"></treatment-bmp-images-editor>
}
