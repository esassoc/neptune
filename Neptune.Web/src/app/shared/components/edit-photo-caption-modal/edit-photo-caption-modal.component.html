<div class="modal">
    <div class="modal-header">
        <h3>{{ title }}</h3>
    </div>
    <div class="modal-body">
        @if (previewUrl) {
            <div class="photo-preview">
                <img [src]="previewUrl" alt="Photo preview" />
            </div>
        }
        <form [formGroup]="formGroup">
            <form-field
                [formControl]="formGroup.controls.Caption"
                fieldLabel="Caption"
                [type]="FormFieldType.Textarea"
                placeholder="Optional caption"></form-field>
        </form>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-primary" [disabled]="formGroup.invalid" (click)="save()">Save</button>
        <button type="button" class="btn btn-primary-outline" (click)="cancel()">Cancel</button>
    </div>
</div>
