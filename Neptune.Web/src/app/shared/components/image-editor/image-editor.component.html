<div class="grid-12">
    <div class="g-col-12">
        <div class="well">
            <div class="grid-12">
                <div class="g-col-6 grid-12">
                    <form-field
                        class="g-col-12"
                        [formControl]="newPhotoFormGroup.controls.newPhoto"
                        fieldLabel="Photo"
                        [type]="FormFieldType.File"
                        placeholder="Choose photo"
                        uploadFileAccepts=".jpg,.jpeg,.png"></form-field>
                    @if (newPhotoPreviewUrl) {
                        <form-field
                            class="g-col-12"
                            [formControl]="newPhotoFormGroup.controls.newPhotoCaption"
                            fieldLabel="Caption"
                            [type]="FormFieldType.Textarea"
                            placeholder="Caption"></form-field>
                        <div class="g-col-12">
                            <button class="btn btn-primary" style="float: right" (click)="addNewImage()">Add Photo</button>
                        </div>
                    }
                </div>
                @if (newPhotoPreviewUrl) {
                    <div class="g-col-6">
                        <img class="new-image-preview" [src]="newPhotoPreviewUrl" alt="Preview of photo to upload." />
                        <div class="image-preview-ribbon">Preview</div>
                    </div>
                }
            </div>
        </div>
    </div>
</div>
<div class="grid-12">
    @for (image of images; track image.FileResourceGUID) {
        <div class="g-col-2">
            @if (imagePreviewUrls()[image.FileResourceGUID]) {
                <img class="existing-image-preview" [src]="imagePreviewUrls()[image.FileResourceGUID]" alt="Preview of existing photo." />
            } @else {
                <div class="existing-image-preview" style="display: flex; align-items: center; justify-content: center; background: #f0f0f0;">
                    <span class="spinner-border spinner-border-sm"></span>
                </div>
            }
        </div>
        @if (useCaptionModal) {
            <!--
                NPT-984: Edit + Delete are compact icon-only buttons above the caption label
                so the photo card reads top-to-bottom (image / actions / caption). Earlier
                rounds tried full-text buttons in a separate column; KE wanted the actions
                tighter and visually attached to the caption block they affect.
            -->
            <div class="g-col-10 caption-readonly">
                <div class="caption-actions">
                    <button type="button" class="btn-icon" title="Edit caption" [disabled]="isLoadingSubmit" (click)="requestEditCaption(image)">
                        <i class="fa fa-pencil"></i>
                    </button>
                    <button type="button" class="btn-icon btn-icon-danger" title="Delete photo" [disabled]="isLoadingSubmit" (click)="deleteImage(image)">
                        <i class="fa fa-trash"></i>
                    </button>
                </div>
                <label class="field-label">Caption</label>
                <div class="caption-row">
                    <span class="caption-text">{{ image.Caption || "(no caption)" }}</span>
                </div>
            </div>
        } @else {
            <div class="g-col-8">
                <form-field [formControl]="captionControls[image.FileResourceGUID]" fieldLabel="Caption" [type]="FormFieldType.Textarea" placeholder="Caption"></form-field>
            </div>
            <div class="g-col-2">
                <button class="btn btn-danger mt-4" [disabled]="isLoadingSubmit" (click)="deleteImage(image)">Delete Photo</button>
            </div>
        }
    }
</div>

@if (!useCaptionModal) {
    <div class="page-footer">
        <button class="btn btn-primary mr-2" [disabled]="isLoadingSubmit || captionControlForm.pristine" (click)="save()">Save</button>
        <button class="btn btn-secondary" [disabled]="isLoadingSubmit" (click)="cancel()">Cancel</button>
    </div>
}
