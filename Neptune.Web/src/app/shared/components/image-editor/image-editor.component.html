<div class="grid-12">
    <div class="g-col-12">
        <div class="well">
            <div class="grid-12">
                <div class="g-col-6 grid-12">
                    <form-field
                        class="g-col-12"
                        [formControl]="newPhotoFormGroup.controls.newPhoto"
                        fieldLabel="Photo"
                        [type]="FormFieldType.File"
                        placeholder="Choose photo"
                        uploadFileAccepts=".jpg,.jpeg,.png"></form-field>
                    @if (newPhotoPreviewUrl) {
                        <form-field
                            class="g-col-12"
                            [formControl]="newPhotoFormGroup.controls.newPhotoCaption"
                            fieldLabel="Caption"
                            [type]="FormFieldType.Textarea"
                            placeholder="Caption"></form-field>
                        <div class="g-col-12">
                            <button type="button" class="btn btn-primary" style="float: right" (click)="addNewImage()">Add Photo</button>
                        </div>
                    }
                </div>
                @if (newPhotoPreviewUrl) {
                    <div class="g-col-6">
                        <img class="new-image-preview" [src]="newPhotoPreviewUrl" alt="Preview of photo to upload." />
                        <div class="image-preview-ribbon">Preview</div>
                    </div>
                }
            </div>
        </div>
    </div>
</div>
<!--
    NPT-984: photo gallery tiles cards left-to-right and wraps to a new row when it runs out
    of width. Each card stacks image / action icons / caption-label / caption-text vertically.
    Earlier rounds used a 12-col grid with one row per photo, which wasted horizontal space
    when a visit had only a handful of photos.
-->
<div class="photo-grid">
    @for (image of images; track image.FileResourceGUID) {
        <div class="photo-card">
            @if (imagePreviewUrls()[image.FileResourceGUID]) {
                <img class="photo-card__image" [src]="imagePreviewUrls()[image.FileResourceGUID]" alt="Preview of existing photo." />
            } @else {
                <div class="photo-card__image photo-card__image--loading">
                    <span class="spinner-border spinner-border-sm"></span>
                </div>
            }
            @if (useCaptionModal) {
                <div class="caption-actions">
                    <button type="button" class="btn-icon" title="Edit caption" [disabled]="isLoadingSubmit" (click)="requestEditCaption(image)">
                        <i class="fa fa-pencil"></i>
                    </button>
                    <button type="button" class="btn-delete-row" aria-label="Delete photo" title="Delete photo" [disabled]="isLoadingSubmit" (click)="deleteImage(image)"></button>
                </div>
                <div class="caption-readonly">
                    <label class="field-label">Caption</label>
                    <div class="caption-row">
                        <span class="caption-text">{{ image.Caption || "(no caption)" }}</span>
                    </div>
                </div>
            } @else {
                <form-field [formControl]="captionControls[image.FileResourceGUID]" fieldLabel="Caption" [type]="FormFieldType.Textarea" placeholder="Caption"></form-field>
                <button type="button" class="btn btn-danger btn-sm" [disabled]="isLoadingSubmit" (click)="deleteImage(image)">Delete Photo</button>
            }
        </div>
    }
</div>

@if (!useCaptionModal) {
    <div class="page-footer">
        <button type="button" class="btn btn-primary mr-2" [disabled]="isLoadingSubmit || captionControlForm.pristine" (click)="save()">Save</button>
        <button type="button" class="btn btn-secondary" [disabled]="isLoadingSubmit" (click)="cancel()">Cancel</button>
    </div>
}
